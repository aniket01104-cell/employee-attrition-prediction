<!DOCTYPE html>
<html>
<head>
    <title>Employee Attrition Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

<h1>Employee Attrition Predictor</h1>

<form action="/predict" method="POST" class="form-grid">


<div class="section-title">Basic Information</div>

<div class="form-group"><label>Age</label><input name="Age" required></div>
<div class="form-group"><label>Monthly Salary</label><input name="MonthlyIncome" required></div>

<div class="form-group"><label>Distance From Home (km)</label><input name="DistanceFromHome" required></div>

<div class="form-group">
<label>Education</label>
<select name="Education">
<option value="1">Below College</option>
<option value="2">College</option>
<option value="3">Bachelor</option>
<option value="4">Master</option>
<option value="5">Doctor</option>
</select>
</div>


<div class="section-title">Work & Satisfaction</div>

<div class="form-group">
<label>Job Level</label>
<select name="JobLevel">
<option value="1">Entry</option>
<option value="2">Junior</option>
<option value="3">Mid</option>
<option value="4">Senior</option>
<option value="5">Executive</option>
</select>
</div>

<div class="form-group">
<label>Job Satisfaction</label>
<select name="JobSatisfaction">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
<option value="4">Very High</option>
</select>
</div>

<div class="form-group">
<label>Environment Satisfaction</label>
<select name="EnvironmentSatisfaction">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
<option value="4">Very High</option>
</select>
</div>

<div class="form-group">
<label>Job Involvement</label>
<select name="JobInvolvement">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
<option value="4">Very High</option>
</select>
</div>

<div class="form-group">
<label>Work Life Balance</label>
<select name="WorkLifeBalance">
<option value="1">Poor</option>
<option value="2">Average</option>
<option value="3">Good</option>
<option value="4">Excellent</option>
</select>
</div>

<div class="form-group">
<label>Relationship with Manager</label>
<select name="RelationshipSatisfaction">
<option value="1">Poor</option>
<option value="2">Average</option>
<option value="3">Good</option>
<option value="4">Excellent</option>
</select>
</div>

<div class="form-group">
<label>Performance Rating</label>
<select name="PerformanceRating">
<option value="1">Low</option>
<option value="2">Good</option>
<option value="3">Excellent</option>
<option value="4">Outstanding</option>
</select>
</div>


<div class="section-title">Experience</div>

<div class="form-group"><label>Total Working Years</label><input name="TotalWorkingYears" required></div>
<div class="form-group"><label>Years At Company</label><input name="YearsAtCompany" required></div>

<div class="form-group"><label>Years In Current Role</label><input name="YearsInCurrentRole" required></div>
<div class="form-group"><label>Years Since Last Promotion</label><input name="YearsSinceLastPromotion" required></div>

<div class="form-group"><label>Years With Current Manager</label><input name="YearsWithCurrManager" required></div>
<div class="form-group"><label>Total Companies Worked</label><input name="NumCompaniesWorked" required></div>

<div class="form-group"><label>Training Sessions Last Year</label><input name="TrainingTimesLastYear" required></div>


<div class="section-title">Compensation & Growth</div>

<div class="form-group"><label>Salary Hike (%)</label><input name="PercentSalaryHike" required></div>

<div class="form-group">
<label>Stock Option Level</label>
<select name="StockOptionLevel">
<option value="0">None</option>
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
</select>
</div>


<div class="section-title">Job Details</div>

<div class="form-group">
<label>Business Travel</label>
<select name="BusinessTravel">
<option value="Travel_Rarely">Rarely</option>
<option value="Travel_Frequently">Frequently</option>
<option value="Non-Travel">None</option>
</select>
</div>

<div class="form-group">
<label>Department</label>
<select name="Department">
<option value="Sales">Sales</option>
<option value="Research & Development">R&D</option>
<option value="Human Resources">HR</option>
</select>
</div>

<div class="form-group">
<label>Job Role</label>
<select name="JobRole">
<option value="Sales Executive">Sales Executive</option>
<option value="Research Scientist">Research Scientist</option>
<option value="Laboratory Technician">Lab Technician</option>
<option value="Manager">Manager</option>
</select>
</div>


<div class="form-group">
<label>OverTime</label>
<select name="OverTime">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>


<div class="section-title">Personal Profile</div>

<div class="form-group">
<label>Education Field</label>
<select name="EducationField">
<option value="Life Sciences">Life Sciences</option>
<option value="Medical">Medical</option>
<option value="Marketing">Marketing</option>
<option value="Technical Degree">Technical</option>
<option value="Human Resources">HR</option>
<option value="Other">Other</option>
</select>
</div>

<div class="form-group">
<label>Gender</label>
<select name="Gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Marital Status</label>
<select name="MaritalStatus">
<option value="Single">Single</option>
<option value="Married">Married</option>
<option value="Divorced">Divorced</option>
</select>
</div>

<div class="full-width center">
<button type="submit">Predict Attrition</button>
</div>

</form>
</div>
</body>
</html>
